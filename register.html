<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daftar — DamayaniStore</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body data-base="../">
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">Damayani<span>Store</span></div>
    <p class="auth-sub">Buat akun baru dan mulai belanja</p>
    <form onsubmit="handleRegister(event)">
      <div class="form-group">
        <label>Nama Lengkap</label>
        <input type="text" id="name" placeholder="Nama Anda" required />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="contoh@email.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="pass" placeholder="Minimal 6 karakter" required />
      </div>
      <button type="submit" class="btn-submit" id="submitBtn">Daftar Sekarang</button>
    </form>
    <div id="msg" class="auth-msg"></div>
    <p class="auth-link">Sudah punya akun? <a href="login.html">Masuk di sini</a></p>
  </div>
</div>

<script>
  /* ---- Helpers ---- */
  function getLS(k){ try{ return JSON.parse(localStorage.getItem(k))||[]; }catch{ return []; } }
  function setLS(k,v){ localStorage.setItem(k, JSON.stringify(v)); }
  function showMsg(t, type) {
    var el = document.getElementById('msg');
    el.textContent = t;
    el.className = 'auth-msg ' + (type === 'error' ? 'err' : 'ok');
  }
  function setBtn(label, disabled) {
    var btn = document.getElementById('submitBtn');
    btn.textContent = label;
    btn.disabled = disabled;
  }

  /* ---- Coba API dulu, fallback ke localStorage ---- */
  var API = 'http://localhost:3000/api';

  function registerViaAPI(name, email, pass, onDone) {
    var ctrl = new AbortController();
    var timer = setTimeout(function(){ ctrl.abort(); }, 4000); // timeout 4 detik

    fetch(API + '/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: name, email: email, password: pass }),
      signal: ctrl.signal
    })
    .then(function(r){ clearTimeout(timer); return r.json(); })
    .then(function(res) {
      if (res.success) { onDone(null, res.data); }
      else             { onDone(res.message || 'Registrasi gagal.'); }
    })
    .catch(function() {
      clearTimeout(timer);
      // API tidak tersedia — pakai localStorage
      registerLocal(name, email, pass, onDone);
    });
  }

  function registerLocal(name, email, pass, onDone) {
    var users = getLS('users');
    var lowerEmail = email.toLowerCase().trim();
    if (users.some(function(u){ return u.email === lowerEmail; })) {
      return onDone('Email sudah terdaftar!');
    }
    var newUser = {
      id: Date.now(),
      name: name.trim(),
      email: lowerEmail,
      password: pass,
      role: 'customer',
      createdAt: new Date().toISOString()
    };
    users.push(newUser);
    setLS('users', users);
    onDone(null, newUser);
  }

  /* ---- Submit handler ---- */
  function handleRegister(e) {
    e.preventDefault();
    var name  = document.getElementById('name').value.trim();
    var email = document.getElementById('email').value.trim();
    var pass  = document.getElementById('pass').value;

    // Validasi front-end
    if (!name)         { showMsg('Nama tidak boleh kosong!', 'error'); return; }
    if (pass.length < 6){ showMsg('Password minimal 6 karakter!', 'error'); return; }

    setBtn('Memproses...', true);

    registerViaAPI(name, email, pass, function(err) {
      setBtn('Daftar Sekarang', false);
      if (err) {
        showMsg(err, 'error');
      } else {
        showMsg('Registrasi berhasil! Mengalihkan ke login...', 'ok');
        setTimeout(function(){ window.location.href = 'login.html'; }, 1200);
      }
    });
  }
</script>
</body>
</html>
