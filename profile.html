<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profil — DamayaniStore</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body data-page="profile" data-base="../">
<div id="toast-wrap"></div>
<div id="navbar-placeholder"></div>

<div class="page-hero" style="padding-bottom:30px;">
  <h1>Profil Saya</h1>
</div>

<section class="section" style="padding-top:36px;max-width:560px;">
  <div style="background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:36px;">
    <div style="display:flex;align-items:center;gap:20px;margin-bottom:28px;">
      <div id="avatar" style="width:70px;height:70px;border-radius:50%;background:var(--grad2);display:flex;align-items:center;justify-content:center;font-size:1.8rem;font-weight:700;color:white;flex-shrink:0;">?</div>
      <div>
        <p id="prof-name" style="font-size:1.2rem;font-weight:700;">-</p>
        <p id="prof-email" style="font-size:0.85rem;color:var(--gray2);margin-top:3px;">-</p>
        <span style="background:rgba(59,130,246,0.15);color:var(--blue);font-size:0.7rem;font-weight:600;padding:2px 10px;border-radius:50px;margin-top:6px;display:inline-block;">Customer</span>
      </div>
    </div>
    <hr style="border:none;border-top:1px solid var(--border);margin-bottom:24px;">
    <div style="display:flex;flex-direction:column;gap:12px;">
      <a href="orders.html" style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;transition:var(--transition);" onmouseover="this.style.borderColor='var(--blue)'" onmouseout="this.style.borderColor='var(--border)'">
        <span style="font-size:0.9rem;font-weight:500;">📋 Riwayat Pesanan</span>
        <span style="color:var(--gray2);">›</span>
      </a>
      <a href="cart.html" style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;transition:var(--transition);" onmouseover="this.style.borderColor='var(--blue)'" onmouseout="this.style.borderColor='var(--border)'">
        <span style="font-size:0.9rem;font-weight:500;">🛍 Keranjang Belanja</span>
        <span style="color:var(--gray2);">›</span>
      </a>
    </div>
    <button onclick="doLogout()" style="display:block;width:100%;margin-top:24px;padding:12px;background:rgba(239,68,68,0.1);color:var(--danger);border:1px solid rgba(239,68,68,0.25);border-radius:12px;font-family:inherit;font-size:0.9rem;font-weight:600;transition:var(--transition);" onmouseover="this.style.background='var(--danger)';this.style.color='white'" onmouseout="this.style.background='rgba(239,68,68,0.1)';this.style.color='var(--danger)'">
      Logout
    </button>
  </div>
</section>

<div id="footer-placeholder"></div>
<script src="../js/common.js"></script>
<script>
  var u = getUser();
  if (!u) { window.location.href = 'login.html'; }
  else {
    document.getElementById('avatar').textContent = u.name ? u.name[0].toUpperCase() : '?';
    document.getElementById('prof-name').textContent = u.name || '-';
    document.getElementById('prof-email').textContent = u.email || '-';
  }
</script>
</body>
</html>
