<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Keranjang — DamayaniStore</title>
  <link rel="stylesheet" href="../css/style.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body data-page="cart" data-base="../">
<div id="toast-wrap"></div>
<div id="navbar-placeholder"></div>

<div class="page-hero" style="padding-bottom:30px;">
  <nav class="breadcrumb" style="padding:0 0 16px;background:none;">
    <a href="../index.html">Home</a>
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    <span>Keranjang</span>
  </nav>
  <h1>Keranjang Belanja</h1>
</div>

<section class="section" style="padding-top:36px;">
  <div id="cart-wrap"></div>
</section>

<div id="footer-placeholder"></div>
<script src="../js/common.js"></script>
<script>
  // Auth check
  if (!getUser()) { window.location.href = 'login.html'; }

  function render() {
    var cart = getCart();
    var wrap = document.getElementById('cart-wrap');

    if (cart.length === 0) {
      wrap.innerHTML = '<div class="empty-state"><p>Keranjang Anda masih kosong.</p><a href="products.html" class="btn-blue">Mulai Belanja</a></div>';
      return;
    }

    var total = cartTotal();
    var count = cart.reduce(function(s,i){return s+i.quantity;},0);

    var itemsHtml = cart.map(function(item){
      return '<div class="cart-item">'
        +'<img src="'+item.image+'" onerror="this.src=\'https://placehold.co/80?text=IMG\'">'
        +'<div class="cart-item-info">'
        +'<span class="cart-item-cat">'+item.category+'</span>'
        +'<p class="cart-item-name">'+item.name+'</p>'
        +'<p class="cart-item-price">'+fmtRp(item.price)+'</p>'
        +'</div>'
        +'<div class="qty-ctrl">'
        +'<button class="qty-btn" onclick="chg('+item.id+',-1)">−</button>'
        +'<span class="qty-val">'+item.quantity+'</span>'
        +'<button class="qty-btn" onclick="chg('+item.id+',1)">+</button>'
        +'</div>'
        +'<div class="cart-item-total">'
        +'<p class="cart-item-subtotal">'+fmtRp(item.price*item.quantity)+'</p>'
        +'<button class="btn-remove" onclick="del('+item.id+')">Hapus</button>'
        +'</div>'
        +'</div>';
    }).join('');

    var summaryHtml = '<div class="order-summary-card">'
      +'<p class="os-title">Ringkasan Belanja</p>'
      +'<div class="os-row"><span class="label">Total Produk</span><span>'+count+' item</span></div>'
      +'<div class="os-row"><span class="label">Subtotal</span><span>'+fmtRp(total)+'</span></div>'
      +'<div class="os-row"><span class="label">Ongkir</span><span style="color:var(--success);">Gratis</span></div>'
      +'<hr class="os-divider">'
      +'<div class="os-total"><span>Total</span><span class="val">'+fmtRp(total)+'</span></div>'
      +'<button class="btn-checkout" onclick="window.location.href=\'checkout.html\'">Lanjut ke Checkout →</button>'
      +'</div>';

    wrap.innerHTML = '<div class="cart-layout"><div class="cart-items">'+itemsHtml+'</div>'+summaryHtml+'</div>';
  }

  function chg(id, d) {
    var cart = getCart();
    for(var i=0;i<cart.length;i++){if(cart[i].id===id){cart[i].quantity+=d;if(cart[i].quantity<=0)cart.splice(i,1);break;}}
    saveCart(cart); updateBadge(); render();
  }

  function del(id) {
    saveCart(getCart().filter(function(i){return i.id!==id;}));
    updateBadge(); render(); toast('Item dihapus','info');
  }

  render();
</script>
</body>
</html>
